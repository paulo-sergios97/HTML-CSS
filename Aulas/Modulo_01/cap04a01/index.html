<!--Cap 04 Aula 02 Primeiro código-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP 04 AULA 02</title>
    <h1>Primeiros comandos em HTML5</h1>
</head>
<body>
    <h2>Olá, mundo!</h2>
    <hr>
    <p>Este é o meu primeiro exercício de HTML5.</p>
    <p>Estou criando o  meu primeiro site!</p>
    <p>Esta será a primeira página web que vou desenvolver</p>
</body>
</html>


<!-- Dentro do HTML existem apenas 2 áreas: head e body, onde head é a área de configuração da página e body é a área onde é inserido o conteúdo da página -->

<!-- UTF-8: Padrão de caracteres que suporta acentuação de palavras, sempre usando na propriedade charset (conjunto de caracteres) -->

<!-- Viewport: indica que o site vai ocupar 100% da tela disponível dada pelo navegador (em escala 1.0) -->
