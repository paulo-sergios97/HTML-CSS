<!--Cap 05 Aula 02 Símbolos e Emoji-->


<!-- SÍMBOLOS ESPECIAIS:
    
    &lt; significa LESS THEN
    &gt; significa GREATER THEN
    &reg; significa MARCA REGISTRADA
    &copy significa COPYRIGHT
    &trade significa TRADE MARK
    &uarr; significa UP ARROW

    -->

<!-- EMOJIS:
    
    &#x + código do emoji + ; (ponto e virgula)

    &#x1F596;
    &#x1F913;

Onde encontrar emojis: https://emojipedia.org/ (emojipedia)

-->



<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP 05 AULA 02</title>
</head>
<body>
    <h1>Símbolos especiais:</h1>
    <p>
        (& lt ;) significa LESS THEN <br>
        (& gt ;) significa GREATER THEN <br>
        (& reg ;) significa MARCA REGISTRADA <br>
        (& copy ;) significa COPYRIGHT <br>
        (& trade ;) significa TRADE MARK <br>
        (& uarr ;) significa UP ARROW
    </p>
    <h1>Emojis:</h1>

    <p>
        &#x + código do emoji + ;<br><br><br>

        <!--usar <b> diversas vezes numa linha para fazer espaçamento entre linhas de um parágrafo é um improviso, não é a forma correta de obter o espaçamento-->

    &#x1F596;<br>
    &#x1F913;
            
    </p>

</body>
</html>
