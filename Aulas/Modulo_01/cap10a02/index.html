<!-- Cap 10 Aula 02 Links internos -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 01</title>
</head>
<body>
    <h1>Esta é a primeira página do  meu site</h1>
    <p>A primeira página está aqui. Se quiser, pode acessar também a minha <a href="pag002.html" target="_blank" rel="external">Segunda Página</a></p>

<!-- Aparentemente os links também funcionam sem que seja definido o parâmetro (rel="") -->

    <p>A primeira página está aqui. Se quiser, pode acessar também a minha <a href="pag002.html" target="_blank" rel="next">Segunda Página</a></p>

    <p>A primeira página está aqui. Se quiser, pode acessar também a minha <a href="pag002.html" rel="next">Segunda Página</a></p>
</body>
</html> 

<!-- Para criar a navegação entre páginas usamos os seguintes parâmetros:  target="_blank" rel="previous" ou target="_blank" rel="next" ou também target="_self".

Neste contexto o valor "previous" ou "prev" representa a página principal do site, o ponto de partida da navegação.

Enquanto que op valor "next" representa a página seguinte do site dentro do escopo de navegação.
-->

<!-- Também é possível usar página que estejam salvas dentro de outras pastas, usando o atalho de teclado 'ctrl + blankspace', como no caso de imagens em pastas diferentes.-->

<!-- Usa-se o parâmetro (target="_self") para abrir a página seguinte na aba atual do navegador, ou seja, é como se não estivesse sendo usado o parâmetro (target="") -->
