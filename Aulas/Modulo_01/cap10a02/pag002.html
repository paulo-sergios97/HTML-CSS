<body>

    <p>Clicando <a href="index.html" target="_blank" rel="previous">aqui</a> você retorna para a Primeira Págino do meu site.</p>

<!-- Para criar a navegação entre páginas usamos os seguintes parâmetros:  target="_blank" rel="previous" ou target="_blank" rel="next".

Neste contexto o valor "previous" ou "prev" representa a página principal do site, o ponto de partida da navegação.

Enquanto que op valor "next" representa a página seguinte do site dentro do escopo de navegação.
-->
