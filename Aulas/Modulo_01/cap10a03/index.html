<!-- Cap 10 Aula 03 Links para download -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links para download</title>
</head>
<body>
    <h1>Links de download</h1>

    <p>Este é um exemplo de uso de links de download</p>
    <p>
        <ul type="square">
            <li><a href="livro/Viagens-No-Scriptorium-Paul-Auster.pdf">Baixar o livro em formato PDF</a></li>
            <li><a href="livro/Viagens-No-Scriptorium-Paul-Auster.zip">Baixar o livro em formato ZIP</a></li>
        </ul>
    </p>    
</body>
</html>


<!--No formato ZIP o download acontece automaticamemte no Chrome.

No caso do formato PDF o arquivo é aberto pelo nanvegador em vez de ser baixado.-->
