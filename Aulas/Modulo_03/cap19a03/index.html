<!-- Cap 19 Aula 03 Imagens que se repetem no fundo do site-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalização dos fundos</title>
     <style>
        body {
            background-image: url("imagens/wallpaper002.jpg");
            background-size: 100px 200px;
            background-repeat: repeat-x;
        }
     </style>
</head>
<body>
    <h1>Teste de aplicação de fundo</h1>
</body>
</html>


<!--
* A propriedade background-image serve para usar imagens como fundo (papel de parede) de um site. Pode ser usada a partir de imagem local usando a tag 'url' ou a partir de fontes externas por meio de link usando a mesma tag ('url').
* A propriedade background-size estipula o valor máximo da imagem (1 vez para toda a imagem ou 2 vezes para altura e largura.Ex.: "background-size: 100px 200px")
* Propriedade 'back-ground: repeat ou no-repeat' para que a imagem se repita por toda a tela.
* Propriedade 'back-ground: repeat-x ou repeat-y' para repetir a imagem somente em um eixo horizontal ou vertical.
-->
