<!-- Cap 19 Aula 04 Configurando a posição da imagem no fundo do site -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posição dos Fundos</title>
    <style>
        div.bloco {
            background-image: url("imagens/wallpaper002.jpg");
            height: 200px;
            border: 1px solid black;
            border-radius: 20px;
            margin: 10px;    
        }

        div#b1 {
            background-position: left top;
        }
        div#b2 {
            background-position: left center;
        }
        div#b3 {
            background-position: center center;
        }



    </style>
</head>
<body>
    <div class="bloco" id="b1"></div>  
    <div class="bloco" id="b2"></div>
    <div class="bloco" id="b3"></div>
</body>
</html>


<!--
* Propriedade 'background-position' usada para posicionar a imagem na tela, pode-se usar os valores: left, rigt, center, bottom, top.

* (.) (#) são respectivamente Class="" e id="", seletor e declaração.

* explorar o valor "vh" na propriedade 'height'; ex.: height: '94vh'
-->
