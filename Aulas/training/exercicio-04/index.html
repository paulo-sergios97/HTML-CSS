<!-- Cap 19 Aula 03 Imagens que se repetem no fundo do site-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalização dos fundos</title>
    <style>
        div.header {
            display: inline-block;
            border: 2px solid black;
            border-radius: 10px;
            
            width: 100%;
            height: 50px;
        }

        div#h01 {
            background-color: transparent;
        }

        div.square {
            display: inline-block;
            border: 2px solid black;
            border-radius: 10px;
            background-color: lightgray;
            width: 300px;
            height: 300px;
        }

        div#s01 {background-color: mintcream;}
        div#s02 {background-color: mintcream;}
        div#s03 {background-color: mintcream;}
        div#s04 {background-color: mintcream;}
        
        div.footer {
            display: inline-block;
            border: 2px solid black;
            border-radius: 10px;
            
            width: 100%;
            height: 50px;
        }

        div#f01 {background-color: transparent;}


        body {
            background-image: url('imagens/wallpaper001.jpg');
            background-size: 100px;
        }
    </style>
</head>
<body>
    <h1>Teste de aplicação de fundo</h1>

    <div class="header" id="h01">
        <h3>Home</h3>

    </div>

    <div>
        <div class= "square" id="s01"></div>
        <div class= "square" id="s02"></div>
        <div class= "square" id="s03"></div>
        <div class= "square" id="s04"></div>
    </div>

    <div class="footer" id="f01">
        <h3>Contato</h3>
    </div>

</body>
</html>
